name: CI SAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: [8.1, 8.2, 8.3]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}

      - name: Composer install
        run: composer install

      - name: Executar tests
        run: ./vendor/bin/phpunit --log-junit resultats.xml

      - name: Pujar artefacte
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultats-SAB
          path: resultats.xml
